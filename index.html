    <!--
      Prevent a flash of the wrong theme: apply persisted preferences before first paint.
      This is intentionally inline and tiny; it runs before the React bundle loads.
    -->
    <script>
      (function () {
        try {
          var root = document.documentElement;
          var theme = localStorage.getItem('rnote.theme');
          var mode = localStorage.getItem('rnote.mode');
          if (theme === 'dark' || theme === 'light') {
            root.setAttribute('data-theme', theme);
          } else {
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            root.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
          }
          if (mode === 'genz' || mode === 'millennial') {
            root.setAttribute('data-mode', mode);
          }
          if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            root.setAttribute('data-reduced-motion', 'true');
          }
        } catch (e) {
          /* localStorage unavailable — fall back to markup defaults. */
        }
      })();
    </script>
