    <!--
      Content Security Policy — defense-in-depth against XSS. script-src is 'self'
      plus the hash of the tiny inline theme-boot script below (no 'unsafe-inline'
      for scripts, so injected inline script and javascript: URLs cannot run).
      connect-src allows https: because AI providers and calendars are
      bring-your-own (arbitrary hosts); everything else is locked to same-origin.
      Note: frame-ancestors/X-Frame-Options can only be set via an HTTP response
      header, which static GitHub Pages hosting does not allow — it is a no-op in
      a <meta> tag, so it is intentionally omitted to avoid a console warning.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'sha256-q3KY0uwrf79C/0FAJhltnLQeQuVhUmk29QPmLBthrco='; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self' https:; manifest-src 'self'; worker-src 'self'; base-uri 'self'; object-src 'none'; form-action 'none'; upgrade-insecure-requests"
    />

    <!--
      Prevent a flash of the wrong theme: apply persisted preferences before first paint.
      This is intentionally inline and tiny; it runs before the React bundle loads.
    -->
    <script>
      (function () {
        try {
          var root = document.documentElement;
          var theme = localStorage.getItem('rnote.theme');
          var mode = localStorage.getItem('rnote.mode');
          if (theme === 'dark' || theme === 'light') {
            root.setAttribute('data-theme', theme);
          } else {
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            root.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
          }
          if (mode === 'genz' || mode === 'millennial') {
            root.setAttribute('data-mode', mode);
          }
          if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            root.setAttribute('data-reduced-motion', 'true');
          }
        } catch (e) {
          /* localStorage unavailable — fall back to markup defaults. */
        }
      })();
    </script>
