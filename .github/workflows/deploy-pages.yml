name: Publish RNOTE to Pages (repo root)

# GitHub Pages for this repo serves the branch root, so we build RNOTE and
# publish its static output to the root. Triggered only by source changes under
# rnote/ (the auto-commit below touches root build files, which the path filter
# excludes — no infinite loop, so no [skip ci] is needed), plus a manual button.
on:
  push:
    branches: [main]
    paths:
      - 'rnote/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-root
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: rnote/package-lock.json
      - run: npm ci
        working-directory: rnote
      # Gate the publish on the same checks CI runs, so a red build (type error,
      # lint failure, or a broken test) can never reach the live site.
      - name: Verify (typecheck · lint · unit tests)
        run: npm run typecheck && npm run lint && npm run test
        working-directory: rnote
      - run: npx vite build --base=./
        working-directory: rnote
      - name: Publish build to repo root
        run: |
          set -e
          # Refresh only the built artifacts at the root; leave source + config.
          rm -rf assets
          rm -f index.html sw.js sw.js.map workbox-*.js manifest.webmanifest \
                registerSW.js favicon.svg apple-touch-icon.png pwa-*.png
          cp -r rnote/dist/. .
          rm -f assets/*.map ./*.map
          touch .nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No build changes to publish."
          else
            git commit -m "chore(pages): publish RNOTE build to root"
            git push
          fi
